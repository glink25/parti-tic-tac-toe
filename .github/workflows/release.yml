name: release
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p dist
          cp parti.room.json index.html room.worker.js dist/
          cd dist && zip -r "$GITHUB_WORKSPACE/parti.room.zip" . && cd ..
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          [[ "$TAG" != v* ]] && TAG="v$(jq -r .version parti.room.json)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" parti.room.zip parti.room.json --clobber
            gh release edit "$TAG" --latest
          else
            gh release create "$TAG" parti.room.zip parti.room.json --title "$TAG" --generate-notes --latest
          fi
